version: '3.8'

services:
  # 1. MySQL Database
  lms-mysql:
    image: mysql:8.4.3
    container_name: lms-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: ExLMS
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  # 2. MinIO (File Storage)
  lms-minio:
    image: quay.io/minio/minio
    container_name: lms-minio
    restart: always
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  # 3. Backend Service (Spring Boot)
  lms-backend:
    build:
      context: ./ExLMS-BE
      dockerfile: Dockerfile
    container_name: lms-backend
    restart: always
    environment:
      - DB_URL=jdbc:mysql://lms-mysql:3306/ExLMS?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&connectionCollation=utf8mb4_unicode_ci
      - DB_USERNAME=root
      - DB_PASSWORD=root
      - MINIO_URL=http://lms-minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
      - JWT_SECRET_KEY=VGhpcy1pcy1hLXZlcnktc2VjdXJlLWtleS1mb3ItZXhsbXMtYmFja2VuZC1wcm9qZWN0LXRlYW0tZml2ZQ==
    depends_on:
      - lms-mysql
      - lms-minio
    ports:
      - "8081:8081"

  # 4. Frontend Service (React/Vite served via Nginx)
  lms-frontend:
    build:
      context: ./ExLMS-FE
      dockerfile: Dockerfile
    container_name: lms-frontend
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - lms-backend

  # 5. Database Admin Tool (phpMyAdmin)
  lms-phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: lms-phpmyadmin
    restart: always
    environment:
      PMA_HOST: lms-mysql
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "8080:80"
    depends_on:
      - lms-mysql

volumes:
  mysql_data:
  minio_data: