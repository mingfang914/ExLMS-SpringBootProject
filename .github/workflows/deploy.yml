name: Deploy ExLMS to Remote Server (Build On Server)

on:
  push:
    branches: [ "develop" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Stop and Fix Permissions
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            if [ -d "/home/ubuntu/exlms-spring" ]; then
              cd /home/ubuntu/exlms-spring
              docker compose down --remove-orphans || true
              cd ..
              # Cấp quyền cho user để action có thể xóa thư mục (rm: true)
              sudo chown -R ${{ secrets.SERVER_USER }}:${{ secrets.SERVER_USER }} /home/ubuntu/exlms-spring || true
              sudo chmod -R 755 /home/ubuntu/exlms-spring || true
            fi

      - name: Copy Code to Server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "."
          target: "/home/ubuntu/exlms-spring"
          rm: true

      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /home/ubuntu/exlms-spring
            
            # Tạo file .env cho build-time và runtime
            cat <<EOF > .env
            # 1. Database
            DB_URL=${{ secrets.DB_URL }}
            DB_USERNAME=${{ secrets.DB_USERNAME }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            
            # 2. Security
            JWT_SECRET_KEY=${{ secrets.JWT_SECRET_KEY }}
            
            # 3. MinIO (File Storage)
            MINIO_URL=${{ secrets.MINIO_URL }}
            MINIO_ROOT_USER=${{ secrets.MINIO_ROOT_USER }}
            MINIO_ROOT_PASSWORD=${{ secrets.MINIO_ROOT_PASSWORD }}
            MINIO_PUBLIC_URL=${{ secrets.MINIO_PUBLIC_URL }}
            
            # 4. Google OAuth
            GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
            GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}
            
            # 5. LiveKit & Meeting Service
            LIVEKIT_URL=${{ secrets.LIVEKIT_URL }}
            LIVEKIT_API_KEY=${{ secrets.LIVEKIT_API_KEY }}
            LIVEKIT_API_SECRET=${{ secrets.LIVEKIT_API_SECRET }}
            MEETING_SERVICE_URL=${{ secrets.MEETING_SERVICE_URL }}
            VITE_LIVEKIT_URL=${{ secrets.VITE_LIVEKIT_URL }}
            VITE_MEETING_SERVICE_URL=${{ secrets.VITE_MEETING_SERVICE_URL }}
            LIVEKIT_NODE_IP=${{ secrets.LIVEKIT_NODE_IP }}
            LIVEKIT_RTC_START=${{ secrets.LIVEKIT_RTC_START }}
            LIVEKIT_RTC_END=${{ secrets.LIVEKIT_RTC_END }}
            LIVEKIT_UDP_RANGE=${{ secrets.LIVEKIT_UDP_RANGE }}
            
            # 6. Mail (Password Reset)
            MAIL_HOST=${{ secrets.MAIL_HOST }}
            MAIL_PORT=${{ secrets.MAIL_PORT }}
            MAIL_USERNAME=${{ secrets.MAIL_USERNAME }}
            MAIL_PASSWORD=${{ secrets.MAIL_PASSWORD }}
            MAIL_FROM=${{ secrets.MAIL_FROM }}
            
            # 7. Collaboration Service
            COLLAB_SERVICE_PORT=${{ secrets.COLLAB_SERVICE_PORT }}
            VITE_COLLAB_SERVICE_URL=${{ secrets.VITE_COLLAB_SERVICE_URL }}
            CORE_BACKEND_INTERNAL_URL=${{ secrets.CORE_BACKEND_INTERNAL_URL }}
            REDIS_HOST=${{ secrets.REDIS_HOST }}
            REDIS_PORT=${{ secrets.REDIS_PORT }}
            
            # 8. App URLs
            APP_FRONTEND_URL=${{ secrets.APP_FRONTEND_URL }}
            APP_BACKEND_URL=${{ secrets.APP_BACKEND_URL }}
            
            # Vite Build Args
            VITE_GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
            VITE_COLLAB_SERVICE_URL=${{ secrets.VITE_COLLAB_SERVICE_URL }}
            VITE_LIVEKIT_URL=${{ secrets.VITE_LIVEKIT_URL }}
            VITE_MEETING_SERVICE_URL=${{ secrets.VITE_MEETING_SERVICE_URL }}
            EOF
            
            # Khởi chạy build và deploy trực tiếp trên server
            docker compose down --remove-orphans
            docker compose up --build -d
            
            # Dọn dẹp các bản build/layer cũ bị thừa
            docker image prune -f
