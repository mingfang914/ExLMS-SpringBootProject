name: Deploy ExLMS to Remote Server (Build On Server)

on:
  push:
    branches: [ "develop" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Copy Code to Server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "."
          target: "/home/ubuntu/exlms-spring"
          rm: true # Làm sạch thư mục target trước khi chép code mới

      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /home/ubuntu/exlms-spring && docker compose down --remove-orphans
            sudo rm -rf /home/***/exlms-spring
            
            # Tạo file .env cho build-time và runtime
            cat <<EOF > .env
            # 1. Database
            DB_URL=${{ secrets.DB_URL }}
            DB_USERNAME=${{ secrets.DB_USERNAME }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            
            # 2. Security
            JWT_SECRET_KEY=${{ secrets.JWT_SECRET_KEY }}
            
            # 3. MinIO (File Storage)
            MINIO_URL=${{ secrets.MINIO_URL }}
            MINIO_ROOT_USER=${{ secrets.MINIO_ROOT_USER }}
            MINIO_ROOT_PASSWORD=${{ secrets.MINIO_ROOT_PASSWORD }}
            
            # 4. Google OAuth
            GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
            GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}
            
            # 5. LiveKit & Meeting Service
            LIVEKIT_API_KEY=${{ secrets.LIVEKIT_API_KEY }}
            LIVEKIT_API_SECRET=${{ secrets.LIVEKIT_API_SECRET }}
            VITE_LIVEKIT_SERVICE_URL=${{ secrets.VITE_LIVEKIT_SERVICE_URL }}
            VITE_LIVEKIT_SERVER_URL=${{ secrets.VITE_LIVEKIT_SERVICE_URL }}
            
            # 6. Mail (Password Reset)
            MAIL_HOST=${{ secrets.MAIL_HOST }}
            MAIL_PORT=${{ secrets.MAIL_PORT }}
            MAIL_USERNAME=${{ secrets.MAIL_USERNAME }}
            MAIL_PASSWORD=${{ secrets.MAIL_PASSWORD }}
            MAIL_FROM=${{ secrets.MAIL_FROM }}
            
            # 7. App URLs
            APP_FRONTEND_URL=${{ secrets.APP_FRONTEND_URL }}
            APP_BACKEND_URL=${{ secrets.APP_BACKEND_URL }}
            
            # Vite Build Args (cần cho build frontend)
            VITE_GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
            EOF
            
            # Khởi chạy build và deploy trực tiếp trên server
            docker compose up --build -d
            
            # Dọn dẹp các bản build/layer cũ bị thừa
            docker image prune -f
