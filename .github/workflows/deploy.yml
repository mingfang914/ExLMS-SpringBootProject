name: Deploy ExLMS to Oracle Cloud

on:
  push:
    branches: [ "develop" ] 

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Tải code từ GitHub về Runner
        uses: actions/checkout@v4

      - name: Copy code từ Runner sang Server Oracle
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "." # Copy toàn bộ thư mục hiện tại (sẽ tự động bỏ qua các file trong .gitignore)
          target: "/home/ubuntu/ExLMS/ExLMS-SpringBootProject"
          rm: true # Xóa code cũ trên server trước khi đè code mới lên để tránh rác

      - name: Chạy lệnh Docker Compose trên Server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /home/ubuntu/ExLMS/ExLMS-SpringBootProject
            
            # Tạo file .env từ secrets (Lưu ý: Bạn cần đặt các key này trong GitHub Settings)
            echo "VITE_GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}" > .env
            echo "GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}" >> .env
            echo "GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}" >> .env
            
            echo "DB_URL=${{ secrets.DB_URL }}" >> .env
            echo "DB_USERNAME=${{ secrets.DB_USERNAME }}" >> .env
            echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" >> .env
            
            echo "JWT_SECRET_KEY=${{ secrets.JWT_SECRET_KEY }}" >> .env
            
            echo "MINIO_URL=${{ secrets.MINIO_URL }}" >> .env
            echo "MINIO_ROOT_USER=${{ secrets.MINIO_ROOT_USER }}" >> .env
            echo "MINIO_ROOT_PASSWORD=${{ secrets.MINIO_ROOT_PASSWORD }}" >> .env
            
            # Cấu hình log levels
            echo "LOGGING_LEVEL_ORG_SPRINGFRAMEWORK_SECURITY=DEBUG" >> .env
            
            # Chỉ build lại backend và frontend, không đụng tới database để tránh mất dữ liệu
            docker compose up -d --build lms-backend lms-frontend